<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Premium Gradient Background */
        .premium-navbar {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            padding: 12px 0;
        }

        /* Brand Style */
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        /* Nav Links */
        .nav-link {
            color: #fff !important;
            margin: 0 10px;
            position: relative;
            transition: 0.3s;
        }

        /* Hover underline animation */
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 2px;
            left: 0;
            bottom: 0;
            background-color: #00d4ff;
            transition: 0.3s;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link:hover {
            color: #00d4ff !important;
        }

        /* Premium Button */
        .btn-premium {
            background: #00d4ff;
            border: none;
            color: #000;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-premium:hover {
            background: #00aacc;
            color: #fff;
        }

        /* Shadow */
        .navbar {
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    {% include 'core/navbar.html' %}

    <!-- Page Content -->
    <div class="container content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
