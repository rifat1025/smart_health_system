{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-5">

    <h2 class="text-center mb-4">Upload Medical Image</h2>

    <form method="POST" enctype="multipart/form-data" class="text-center">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Upload & Analyze
        </button>
    </form>

</div>

{% endblock %}
