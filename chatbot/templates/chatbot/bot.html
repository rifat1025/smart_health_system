{% extends "clasify/base.html" %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Medical Chatbot</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* Layout */
.main-container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: #0f2027;
    color: white;
    padding: 15px;
}

.sidebar h4 {
    margin-bottom: 20px;
}

.sidebar button {
    width: 100%;
    margin-bottom: 10px;
}

/* Chat Area */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #f4f6f9;
}

/* Header */
.chat-header {
    padding: 15px;
    background: white;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
}

.chat-header img {
    width: 40px;
    border-radius: 50%;
    margin-right: 10px;
}

/* Chat Box */
.chat-box {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* Messages */
.message {
    margin-bottom: 15px;
    display: flex;
}

.user {
    justify-content: flex-end;
}

.bot {
    justify-content: flex-start;
}

.message-content {
    max-width: 60%;
}

.message p {
    padding: 12px;
    border-radius: 12px;
}

.user p {
    background: #007bff;
    color: white;
}

.bot p {
    background: #e9ecef;
}

/* Image */
.chat-image {
    max-width: 200px;
    border-radius: 10px;
    margin-top: 5px;
}

/* Input */
.chat-input {
    padding: 15px;
    background: white;
    border-top: 1px solid #ddd;
}

/* Upload box */
.upload-box {
    display: flex;
    gap: 10px;
}

</style>
</head>

<body>

<div class="main-container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h4>AI Assistant</h4>
        <button class="btn btn-light">New Chat</button>
        <hr>
        <p><small>History</small></p>
        <p>Bone Scan 1</p>
        <p>Fracture Check</p>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">

        <!-- Header -->
        <div class="chat-header">
            <img src="/static/images/bot.png">
            <strong>Medical Image Analyzer</strong>
        </div>

        <!-- Chat -->
        <div class="chat-box" id="chatBox">
            <div class="message bot">
                <div class="message-content">
                    <p>Upload your X-ray or bone image for AI analysis.</p>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="chat-input">
            <form id="uploadForm" class="upload-box">
                <input type="file" name="image" class="form-control" required>
                <button class="btn btn-primary">Analyze</button>
            </form>
        </div>

    </div>

</div>

<script>
const form = document.getElementById("uploadForm");
const chatBox = document.getElementById("chatBox");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    let file = form.querySelector("input").files[0];
    if (!file) return;

    let imgURL = URL.createObjectURL(file);

    // User message
    chatBox.innerHTML += `
    <div class="message user">
        <div class="message-content">
            <p>Uploaded Image:</p>
            <img src="${imgURL}" class="chat-image">
        </div>
    </div>
    `;

    // Loading
    let loadingId = "load-" + Date.now();
    chatBox.innerHTML += `
    <div class="message bot" id="${loadingId}">
        <div class="message-content">
            <p>Analyzing...</p>
        </div>
    </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    let formData = new FormData();
    formData.append("image", file);

    fetch("/predict/", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById(loadingId).remove();

        chatBox.innerHTML += `
        <div class="message bot">
            <div class="message-content">
                <p><strong>Prediction:</strong> ${data.label}</p>
                <p><strong>Description:</strong> ${data.description}</p>
            </div>
        </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;
    })
    .catch(() => {
        document.getElementById(loadingId).remove();
        chatBox.innerHTML += `
        <div class="message bot">
            <div class="message-content">
                <p>Error analyzing image.</p>
            </div>
        </div>
        `;
    });

    form.reset();
});
</script>

</body>
</html>
